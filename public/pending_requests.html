<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Requests</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
:root {
    --brand-900: #073b4c;
    --brand-700: #0b647f;
    --brand-500: #118ab2;
    --highlight: #ffd166;
    --brand-blue: #118ab2;
    --brand-blue-dark: #073b4c;
    --brand-red: #ef476f;
    --brand-green: #06d6a0;
    --brand-orange: #f76c5e;
    --text-main: #12313d;
    --text-soft: #56717a;
}
body {
    margin: 0;
    min-height: 100vh;
    font-family: "Manrope", sans-serif;
    color: var(--text-main);
    background: radial-gradient(circle at 85% 20%, rgba(17, 138, 178, 0.2), transparent 32%), radial-gradient(circle at 20% 85%, rgba(255, 209, 102, 0.2), transparent 30%), linear-gradient(115deg, #ecf7fb 0%, #ffffff 48%, #eef7fa 100%);
    overflow-x: hidden;
}
body::before,
body::after {
    content: "";
    position: fixed;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    filter: blur(8px);
    pointer-events: none;
    z-index: 0;
}
body::before { top: -120px; right: -120px; background: radial-gradient(circle, rgba(17,138,178,0.28), transparent 72%); }
body::after { bottom: -160px; left: -140px; background: radial-gradient(circle, rgba(239,71,111,0.14), transparent 70%); }
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: linear-gradient(180deg, var(--brand-900), var(--brand-700), var(--brand-500));
    color: #fff;
    padding: 25px 18px;
    z-index: 1000;
}
.logo-box { text-align: center; margin-bottom: 35px; }
.logo-box img { width: 70px; background: #fff; padding: 8px; border-radius: 14px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
.logo-box h5 { margin-top: 12px; font-weight: 700; letter-spacing: 0.5px; }
.sidebar a { color: #fff; display: block; text-decoration: none; padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; transition: all 0.3s ease; font-size: 0.95rem; }
.sidebar a:hover { background: rgba(255,255,255,0.15); padding-left: 20px; transform: translateX(2px); }
.sidebar a.active { background: rgba(255,255,255,0.15); box-shadow: inset 3px 0 0 var(--highlight); padding-left: 20px; }
.main { margin-left: 250px; padding: 32px; min-height: 100vh; position: relative; z-index: 1; }
.top-header { display:flex; align-items:center; justify-content:space-between; background: linear-gradient(90deg, var(--brand-900), var(--brand-700)); color:#fff; border-radius: 12px; padding: 16px 28px; margin-bottom: 28px; box-shadow: 0 8px 24px rgba(7,59,76,0.18); border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; }
.top-header::before { content: ""; position: absolute; top: -50%; right: -50%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,209,102,0.2), transparent 70%); border-radius: 50%; pointer-events: none; }
.header-title { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: 0.3px; margin: 0; position: relative; z-index: 1; }
.header-actions { display: flex; align-items: center; gap: 14px; position: relative; z-index: 1; }
.header-search-box { display: flex; align-items: center; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 8px 14px; width: 220px; transition: all 0.3s ease; }
.header-search-box:focus-within { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); box-shadow: 0 6px 16px rgba(11,35,71,0.15); }
.header-search-box input { border: 0; background: transparent; outline: 0; font-size: 0.9rem; flex: 1; color: #fff; }
.header-search-box input::placeholder { color: rgba(255,255,255,0.7); }
.header-search-box i { color: rgba(255,255,255,0.6); margin-right: 8px; }
.header-icon-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: all 0.3s ease; padding: 0; }
.header-icon-btn:hover { background: rgba(255,255,255,0.15); box-shadow: 0 6px 16px rgba(11,35,71,0.2); transform: translateY(-2px); }
.header-profile { display:flex; align-items:center; gap:12px; padding-left:16px; border-left:1px solid rgba(255,255,255,0.15); }
.header-avatar { width:40px; height:40px; border-radius:50%; background: linear-gradient(135deg, var(--brand-blue-dark), var(--brand-blue)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.9rem; box-shadow:0 3px 10px rgba(11,35,71,0.2); }
.metrics-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:16px; margin-bottom:32px; }
.metric-card { border-radius:16px; padding:18px; border:none; color:#fff; min-height:160px; box-shadow:0 8px 20px rgba(0,0,0,0.08); display:flex; flex-direction:column; justify-content:space-between; }
.metric-card.card-pending { background: linear-gradient(135deg, #ffd166 0%, #ffb84d 50%, #ff9f43 100%); }
.metric-card.card-approved { background: linear-gradient(135deg, #06d6a0 0%, #1dd1a1 50%, #10ac84 100%); }
.metric-card.card-rejected { background: linear-gradient(135deg, #ef476f 0%, #f24e4e 50%, #d63031 100%); }
.metric-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
.metric-label { font-size:0.85rem; font-weight:600; opacity:0.95; }
.metric-icon { width:48px; height:48px; border-radius:12px; background: rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
.metric-value { font-size:2.2rem; font-weight:800; line-height:1; }
.requests-panel { background:#fff; border-radius:16px; padding:24px; box-shadow:0 8px 24px rgba(0,0,0,0.08); border: 1px solid rgba(17,138,178,0.1); }
.requests-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid rgba(17,138,178,0.08); }
.requests-head-left { display:flex; flex-direction:column; gap:4px; }
.requests-head h3 { margin:0; color:var(--text-main); font-weight:700; font-size:1.1rem; }
.requests-subtitle { color: var(--text-soft); font-size:0.88rem; }
.requests-badge { display:inline-flex; align-items:center; gap:6px; background: rgba(17,138,178,0.08); color: var(--brand-500); border:1px solid rgba(17,138,178,0.15); border-radius:999px; padding:6px 12px; font-size:0.82rem; font-weight:700; margin-right:10px; }
.request-item { display:grid; grid-template-columns: 1fr auto; gap:16px; padding:18px 18px 16px; background: linear-gradient(135deg, #ffffff 0%, #f7fbfd 100%); border-radius:16px; margin-bottom:12px; border:1px solid rgba(17,138,178,0.08); border-left:5px solid var(--brand-500); box-shadow:0 6px 16px rgba(7,59,76,0.06); }
.request-item:hover { transform: translateY(-2px); box-shadow:0 12px 28px rgba(17,138,178,0.12); }
.request-info { flex:1; }
.request-topline { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:10px; }
.request-emp-name { font-weight:700; color:var(--text-main); margin-bottom:4px; font-size:1rem; }
.request-dates { font-size:0.9rem; color:var(--text-soft); margin-bottom:4px; }
.request-reason { font-size:0.88rem; color:var(--text-soft); line-height:1.5; background: rgba(17,138,178,0.04); border-radius:10px; padding:12px; margin-top:10px; }
.request-status { padding:6px 12px; border-radius:999px; font-size:0.76rem; font-weight:700; white-space:nowrap; }
.status-pending { background: rgba(255,169,64,0.15); color:#ff9f43; }
.status-approved { background: rgba(6,214,160,0.15); color:#06d6a0; }
.status-rejected { background: rgba(239,71,111,0.15); color:#ef476f; }
.request-footer { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:14px; padding-top:12px; border-top:1px dashed rgba(17,138,178,0.14); }
.request-meta { display:flex; gap:10px; flex-wrap:wrap; font-size:0.78rem; color:var(--text-soft); }
.request-meta span { background: rgba(7,59,76,0.05); padding:5px 10px; border-radius:999px; }
.request-actions { display:flex; gap:6px; }
.btn-approve, .btn-reject, .btn-view { padding:6px 12px; border:none; border-radius:6px; font-size:0.85rem; cursor:pointer; transition:all 0.3s ease; font-weight:600; min-width:40px; min-height:34px; }
.btn-approve { background: linear-gradient(135deg, var(--brand-green), #1dd1a1); color:#fff; }
.btn-reject { background: linear-gradient(135deg, var(--brand-red), #f24e4e); color:#fff; }
.btn-view { background: rgba(17,138,178,0.1); color: var(--brand-500); border: 1px solid rgba(17,138,178,0.2); }
.empty-state { text-align:center; padding:40px 20px; color:var(--text-soft); }
.empty-state-icon { font-size:3rem; margin-bottom:12px; opacity:0.5; }
@media(max-width: 992px) { .sidebar { position:relative; width:100%; height:auto; display:flex; align-items:center; justify-content:space-between; padding:20px; } .main { margin-left:0; padding:20px; } .request-item { grid-template-columns: 1fr; } .request-footer { flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body data-view="pending">
<div class="sidebar">
  <div class="logo-box">
    <img src="../assets/logo.png" alt="logo">
    <h5>MBSL Reporting</h5>
  </div>
  <a href="reporting_dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
  <a href="pending_requests.html" class="active"><i class="bi bi-clipboard-check me-2"></i>Pending Requests</a>
  <a href="request_history.html"><i class="bi bi-clock-history me-2"></i>Request History</a>
 
  <a href="login.html"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
</div>

<div class="main">
  <div class="top-header">
    <h1 class="header-title">Welcome, <span id="rpName">Reporting Person</span>!</h1>
    <div class="header-actions">
      <div class="header-search-box">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search requests" aria-label="Search requests">
      </div>
      <button class="header-icon-btn" title="Settings" type="button"><i class="bi bi-gear"></i></button>
      <button class="header-icon-btn" title="Notifications" type="button"><i class="bi bi-bell"></i></button>
      <div class="header-profile">
        <div class="header-avatar" id="rpAvatar" title="Reporting Person Profile">RP</div>
      </div>
    </div>
  </div>

  <div class="requests-panel" id="pending-requests">
    <div class="requests-head">
      <div class="requests-head-left">
        <h3><i class="bi bi-list-check me-2"></i>Pending Requests Queue</h3>
        <div class="requests-subtitle">All employee leave requests waiting for your review are shown here.</div>
      </div>
      <div><span class="requests-badge"><i class="bi bi-inbox"></i> Live queue</span></div>
    </div>
    <div id="requestsList"></div>
  </div>
</div>

<div id="approvalModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; backdrop-filter: blur(4px);">
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:#fff; border-radius:16px; padding:32px; width:90%; max-width:500px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h3 style="margin:0; color:var(--text-main);">Request Details</h3>
      <button id="closeModal" style="background:none; border:none; font-size:24px; cursor:pointer; color:#999;">×</button>
    </div>
    <div id="modalContent" style="color:var(--text-main); margin-bottom:24px;"></div>
    <div style="display:flex; gap:12px;">
      <button id="approveBtn" class="btn-approve" style="flex:1; border:none; padding:10px 16px;"><i class="bi bi-check-circle me-2"></i>Approve</button>
      <button id="rejectBtn" class="btn-reject" style="flex:1; border:none; padding:10px 16px;"><i class="bi bi-x-circle me-2"></i>Reject</button>
    </div>
  </div>
</div>

<div id="profileModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2001; backdrop-filter: blur(4px);">
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:#fff; border-radius:16px; padding:32px; width:90%; max-width:500px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
      <h3 style="margin:0; color:var(--text-main);">My Profile</h3>
      <button id="closeProfileModal" style="background:none; border:none; font-size:24px; cursor:pointer; color:#999;">×</button>
    </div>
    <div id="profileContent" style="color:var(--text-main);"></div>
  </div>
</div>

<script src="../assets/js/reporting_requests.js"></script>
</body>
</html>
