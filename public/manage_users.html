<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Users - MBSL</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root {
    --brand-900: #073b4c;
    --brand-700: #0b647f;
    --brand-500: #118ab2;
    --highlight: #ffd166;
    --surface: #f6fafc;
    --text-main: #12313d;
    --text-soft: #56717a;
    --panel-shadow: 0 24px 60px rgba(7, 59, 76, 0.2);
    --brand-blue: #118ab2;
    --brand-blue-dark: #073b4c;
    --brand-red: #ef476f;
    --brand-ice: rgba(17, 138, 178, 0.1);
    --glass: rgba(255,255,255,0.08);
    --card-shadow: 0 24px 60px rgba(7, 59, 76, 0.2);
}
/* Advanced details modal styles */
#mu-details-modal .modal-content { border-radius: 14px; overflow: hidden; }
.profile-card { background: linear-gradient(180deg, rgba(17,138,178,0.06), rgba(255,209,102,0.03)); border-radius: 12px; box-shadow: var(--card-shadow); }
.avatar { width: 96px; height: 96px; line-height:96px; margin: 0 auto; border-radius:50%; background: var(--brand-500); color:#fff; font-weight:700; font-size:32px; }
.emp-badge { background: rgba(17,138,178,0.08); padding:6px 10px; border-radius:10px; display:inline-block; color:var(--brand-700); }
.status-pill { display:inline-block; padding:6px 10px; border-radius:999px; color:#fff; font-size:0.85rem; margin-top:6px; }
.status-active { background: var(--brand-500); }
.status-inactive { background: #ef476f; }
.details-grid > div { padding:10px 0; border-bottom: 1px dashed rgba(0,0,0,0.04); }
#mu-details-modal .modal-header .btn { margin-right:8px; }
body {
    margin: 0;
    min-height: 100vh;
    font-family: "Manrope", sans-serif;
    color: var(--text-main);
    background:
        radial-gradient(circle at 85% 20%, rgba(17, 138, 178, 0.2), transparent 32%),
        radial-gradient(circle at 20% 85%, rgba(255, 209, 102, 0.2), transparent 30%),
        linear-gradient(115deg, #ecf7fb 0%, #ffffff 48%, #eef7fa 100%);
}
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: linear-gradient(180deg, var(--brand-900), var(--brand-700), var(--brand-500));
    color: #fff;
    padding: 25px 18px;
    z-index: 100;
}
.logo-box{
    text-align:center;
    margin-bottom:35px;
}
.logo-box img{
    width:70px;
    background:#fff;
    padding:8px;
    border-radius:14px;
}
.logo-box h5{
    margin-top:12px;
    font-weight:700;
}
.sidebar a {
    color: #fff;
    display: block;
    text-decoration: none;
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 10px;
    transition: .2s;
}
.sidebar a:hover,
.sidebar a.active {
    background: rgba(255,255,255,0.15);
    padding-left: 20px;
}
.sidebar a.active{
    box-shadow:inset 3px 0 0 var(--highlight);
}
.main {
    margin-left: 250px;
    padding: 32px 24px;
    min-height: 100vh;
    background: transparent;
}
@media(max-width:992px){
    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }
    .main{
        margin-left:0;
        padding:20px 8px;
    }
}
.card,
.table,
.table-responsive {
    border-radius: 18px;
    box-shadow: var(--panel-shadow);
    background: rgba(255,255,255,0.92);
}
.table thead {
    background: linear-gradient(90deg, var(--brand-900), var(--brand-700));
    color: #fff;
}
.badge-active {
    background: var(--brand-500);
}
.badge-inactive {
    background: #ef476f;
}
.action-btn {
    border: none;
    background: none;
    color: var(--brand-900);
    font-size: 1.2rem;
    margin-right: 8px;
    transition: color 0.2s;
}
.action-btn:hover {
    color: var(--highlight);
}
</style>
</head>
<body>
<div class="sidebar">
    <div class="logo-box">
        <img src="../assets/logo.png" alt="logo">
        <h5>MBSL Admin</h5>
    </div>
    <a href="admin_dashboard.html"><i class="bi bi-grid me-2"></i>Dashboard</a>
    <a href="add_employee.html"><i class="bi bi-person-plus me-2"></i>Add Employee</a>
    <a href="add_rp.html"><i class="bi bi-person-badge me-2"></i>Add Reporting Person</a>
    <a href="manage_users.html" class="active"><i class="bi bi-people me-2"></i>Manage All Users</a>
    <a href="view_leaves.html"><i class="bi bi-calendar-check me-2"></i>View Leave Requests</a>
    <a href="reports.html"><i class="bi bi-bar-chart-line me-2"></i>Generate Reports</a>
    <a href="../../backend/api/admin/logout.php"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
</div>
<div class="main">
    <h2 class="mb-4 fw-bold">Manage Users</h2>
    <div class="table-responsive">
        <table class="table align-middle table-hover">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="usersTableBody">
                <!-- Example static rows, replace with dynamic JS/PHP -->
                <tr>
                    <td>1</td>
                    <td>Jane Doe</td>
                    <td>jane@example.com</td>
                    <td>Employee</td>
                    <td><span class="badge badge-active">Active</span></td>
                    <td>
                        <button class="action-btn" title="Edit"><i class="bi bi-pencil"></i></button>
                        <button class="action-btn" title="View Details"><i class="bi bi-eye"></i></button>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>John Smith</td>
                    <td>john@example.com</td>
                    <td>Manager</td>
                    <td><span class="badge badge-inactive">Inactive</span></td>
                    <td>
                        <button class="action-btn" title="Edit"><i class="bi bi-pencil"></i></button>
                        <button class="action-btn" title="View Details"><i class="bi bi-eye"></i></button>
                    </td>
                </tr>
                <!-- More rows dynamically loaded -->
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/manage_users.js"></script>
</body>
</html>
