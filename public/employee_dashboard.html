<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --brand-900: #073b4c;
    --brand-700: #0b647f;
    --brand-500: #118ab2;
    --highlight: #ffd166;
    --brand-blue: #118ab2;
    --brand-blue-dark: #073b4c;
    --brand-red: #ef476f;
    --brand-green: #06d6a0;
    --brand-orange: #f76c5e;
    --brand-purple: #a23b72;
    --brand-ice: rgba(17, 138, 178, 0.1);
    --surface: #f6fafc;
    --text-main: #12313d;
    --text-soft: #56717a;
    --glass: rgba(255,255,255,0.08);
    --card-shadow: 0 24px 60px rgba(7, 59, 76, 0.2);
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Manrope", sans-serif;
    color: var(--text-main);
    background:
        radial-gradient(circle at 85% 20%, rgba(17, 138, 178, 0.2), transparent 32%),
        radial-gradient(circle at 20% 85%, rgba(255, 209, 102, 0.2), transparent 30%),
        linear-gradient(115deg, #ecf7fb 0%, #ffffff 48%, #eef7fa 100%);
    position: relative;
    overflow-x: hidden;
}

body::before,
body::after {
    content: "";
    position: fixed;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    filter: blur(8px);
    pointer-events: none;
    z-index: 0;
}

body::before {
    top: -120px;
    right: -120px;
    background: radial-gradient(circle, rgba(17, 138, 178, 0.28), transparent 72%);
}

body::after {
    bottom: -160px;
    left: -140px;
    background: radial-gradient(circle, rgba(239, 71, 111, 0.14), transparent 70%);
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: linear-gradient(180deg,
        var(--brand-900),
        var(--brand-700),
        var(--brand-500)
    );
    color: #fff;
    padding: 25px 18px;
    z-index: 1000;
}

.logo-box {
    text-align: center;
    margin-bottom: 35px;
}

.logo-box img {
    width: 70px;
    background: #fff;
    padding: 8px;
    border-radius: 14px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.15);
}

.logo-box h5 {
    margin-top: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

.sidebar a {
    color: #fff;
    display: block;
    text-decoration: none;
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 10px;
    transition: all 0.3s ease;
    font-size: 0.95rem;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.15);
    padding-left: 20px;
    transform: translateX(2px);
}

.sidebar a.active {
    background: rgba(255,255,255,0.15);
    box-shadow: inset 3px 0 0 var(--highlight);
    padding-left: 20px;
}

/* MAIN CONTAINER */
.main {
    margin-left: 250px;
    padding: 32px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
}

/* TOP HEADER */
.top-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(90deg, var(--brand-900), var(--brand-700));
    color: #fff;
    border-radius: 12px;
    padding: 16px 28px;
    margin-bottom: 28px;
    margin-top: 0;
    box-shadow: 0 8px 24px rgba(7,59,76,0.18);
    border: 1px solid rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
}

.top-header::before {
    content: "";
    position: absolute;
    top: -50%;
    right: -50%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,209,102,0.2), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
}

.header-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
    margin: 0;
    position: relative;
    z-index: 1;
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
}

.header-search-box {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 14px;
    width: 220px;
    transition: all 0.3s ease;
}
.header-search-box:focus-within {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 6px 16px rgba(11,35,71,0.15);
}

.header-search-box input {
    border: 0;
    background: transparent;
    outline: 0;
    font-size: 0.9rem;
    flex: 1;
    color: #fff;
}

.header-search-box input::placeholder {
    color: rgba(255,255,255,0.7);
}

.header-search-box i {
    color: rgba(255,255,255,0.9);
    font-size: 1rem;
    margin-right: 8px;
}

.header-icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.3s ease;
    padding: 0;
}

.header-icon-btn:hover {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 6px 16px rgba(11,35,71,0.2);
    transform: translateY(-2px);
}

.header-profile {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-left: 16px;
    border-left: 1px solid rgba(255,255,255,0.15);
}

.header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brand-blue-dark), var(--brand-blue));
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 3px 10px rgba(11,35,71,0.2);
}

.header-avatar:hover {
    box-shadow: 0 6px 18px rgba(11,35,71,0.3);
    transform: scale(1.05);
}

/* ADVANCED METRIC CARDS */
.metrics-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
}

.metric-card {
    border-radius: 16px;
    padding: 18px;
    border: none;
    color: #fff;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 160px;
}

.metric-card::before {
    content: "";
    position: absolute;
    top: -50%;
    right: -50%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
}

.metric-card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
    pointer-events: none;
}

/* Color Gradients for Cards */
.metric-card.card-employees {
    background: linear-gradient(135deg, #073b4c 0%, #0b647f 50%, #118ab2 100%);
}

.metric-card.card-reporting {
    background: linear-gradient(135deg, #06d6a0 0%, #1dd1a1 50%, #10ac84 100%);
}

.metric-card.card-approved {
    background: linear-gradient(135deg, #ffd166 0%, #ffb84d 50%, #ff9f43 100%);
}

.metric-card.card-rejected {
    background: linear-gradient(135deg, #ef476f 0%, #f24e4e 50%, #d63031 100%);
}

.metric-card.card-accepted {
    background: linear-gradient(135deg, #a23b72 0%, #c7417b 50%, #e74c3c 100%);
}

.metric-card:hover {
    transform: translateY(-12px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.metric-card:hover::before {
    transform: scale(1.2);
}

.metric-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
}

.metric-label {
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0.95;
    letter-spacing: 0.3px;
}

.metric-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

.metric-value {
    font-size: 2.2rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
}

.trend {
    font-size: 0.75rem;
    font-weight: 600;
    opacity: 0.9;
    padding: 4px 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    display: inline-block;
}

.metric-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
}



.trend.trend-up {
    color: #4ade80;
}

.trend.trend-down {
    color: #f87171;
}


/* CHART CARDS - SMALLER */
.charts-row {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 20px;
    margin-top: 40px;
    margin-bottom: 32px;
    padding-top: 40px;
    border-top: 1px solid rgba(17, 138, 178, 0.08);
}

.chart-card {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    border: 1px solid rgba(17, 138, 178, 0.1);
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
}

.chart-card::before {
    content: "";
    position: absolute;
    top: -80px;
    right: -80px;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(17,138,178,0.04), transparent 70%);
    pointer-events: none;
}

.chart-card:hover {
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    transform: translateY(-3px);
}

.chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
}

.chart-header h5 {
    color: var(--text-main);
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.3px;
    margin: 0;
}

.chart-card canvas {
    position: relative;
    z-index: 1;
    max-height: 250px;
}

/* RECENT ACTIVITIES - ADVANCED */
.recent-activities {
    margin-top: 14px;
}

.activity-panel {
    border-radius: 20px;
    border: 1px solid rgba(17, 138, 178, 0.14);
    background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(246, 252, 255, 0.86)),
        linear-gradient(115deg, rgba(17, 138, 178, 0.06), rgba(255, 209, 102, 0.08));
    box-shadow: 0 18px 45px rgba(7, 59, 76, 0.12);
    backdrop-filter: blur(10px);
    overflow: hidden;
}

.activity-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 18px;
    border-bottom: 1px solid rgba(17, 138, 178, 0.12);
    background: linear-gradient(90deg, rgba(17, 138, 178, 0.11), rgba(255, 209, 102, 0.1));
}

.activity-head strong {
    font-size: 1.02rem;
    letter-spacing: 0.4px;
    text-transform: uppercase;
}

.activity-count-pill {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.76rem;
    font-weight: 700;
    color: #0b647f;
    background: rgba(17, 138, 178, 0.12);
}

.activity-list {
    max-height: 340px;
    overflow: auto;
    margin: 0;
    position: relative;
    list-style: none;
}

.activity-list::-webkit-scrollbar {
    width: 8px;
}

.activity-list::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(17, 138, 178, 0.55), rgba(11, 100, 127, 0.55));
    border-radius: 999px;
}

.activity-list::before {
    display: none; /* replaced by .activity-line element */
}

.activity-line {
    position: absolute;
    left: 29px;
    width: 3px;
    background: linear-gradient(180deg, rgba(17, 138, 178, 0.7), rgba(17, 138, 178, 0.12));
    border-radius: 2px;
    z-index: 0;
    transition: height 0.22s ease, top 0.22s ease, opacity 0.2s ease;
}

.activity-list.is-empty::before {
    display: none;
}

.activity-item {
    border: 0;
    background: transparent;
    padding: 14px 14px 14px 52px;
    position: relative;
    z-index: 1;
    transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    opacity: 0;
    transform: translateY(8px);
    animation: slideUpFade 0.5s ease forwards;
}

.activity-item + .activity-item {
    border-top: 1px dashed rgba(18, 49, 61, 0.14);
}

.activity-item:hover {
    background: rgba(17, 138, 178, 0.06);
    transform: translateX(4px);
    box-shadow: inset 0 0 0 1px rgba(17, 138, 178, 0.12);
}

.activity-dot {
    position: absolute;
    left: 21px;
    top: 22px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #118ab2, #06d6a0);
    box-shadow: 0 0 0 4px rgba(17, 138, 178, 0.15);
}

.activity-dot-new {
    background: linear-gradient(135deg, #06d6a0, #1dd1a1);
    box-shadow: 0 0 0 4px rgba(6, 214, 160, 0.2);
}

.activity-dot-update {
    background: linear-gradient(135deg, #ffd166, #ff9f43);
    box-shadow: 0 0 0 4px rgba(255, 209, 102, 0.24);
}

.activity-dot-alert {
    background: linear-gradient(135deg, #ef476f, #d63031);
    box-shadow: 0 0 0 4px rgba(239, 71, 111, 0.22);
}

.activity-title {
    font-weight: 700;
    color: #12313d;
    margin-bottom: 4px;
    line-height: 1.35;
}

.activity-meta {
    color: #4f6c75;
    font-size: 0.82rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.activity-meta::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(79, 108, 117, 0.5);
}

.activity-time {
    color: #607b84;
    font-size: 0.76rem;
    white-space: nowrap;
    padding-left: 10px;
    text-align: right;
}

.activity-time .badge {
    border: 1px solid rgba(17, 138, 178, 0.2);
    font-weight: 600;
}

.activity-empty {
    padding: 24px 18px;
    color: #6a858d;
    text-align: center;
    font-weight: 600;
}

@keyframes slideUpFade {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* RESPONSIVE */
@media(max-width: 1200px) {
    .charts-row {
        grid-template-columns: 1fr;
    }
}

@media(max-width: 992px) {
    .sidebar {
        position: relative;
        width: 100%;
        height: auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px;
    }

    .logo-box {
        margin-bottom: 0;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .logo-box img {
        width: 50px;
    }

    .main {
        margin-left: 0;
        padding: 20px;
    }

    .top-header {
        flex-direction: column;
        gap: 16px;
        padding: 16px 20px;
    }

    .header-search-box {
        width: 100%;
    }

    .metrics-row {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
    }

    .metric-card {
        padding: 20px;
        min-height: 180px;
    }

    .metric-value {
        font-size: 2.2rem;
    }

    .metric-icon {
        width: 50px;
        height: 50px;
        font-size: 1.4rem;
    }
}

@media(max-width: 768px) {
    .sidebar {
        flex-direction: column;
        gap: 16px;
    }

    .metric-card {
        min-height: 160px;
    }

    .metric-value {
        font-size: 2rem;
    }

    .header-actions {
        width: 100%;
        flex-wrap: wrap;
    }

    .header-search-box {
        order: 3;
        width: 100%;
        margin-top: 8px;
    }

    .activity-item {
        display: block !important;
        padding: 14px 14px 14px 46px;
    }

    .activity-dot {
        left: 17px;
    }

    .activity-time {
        padding-left: 0;
        margin-top: 6px;
        text-align: left;
        font-size: 0.74rem;
    }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo-box">
        <img src="../assets/logo.png" alt="logo">
        <h5>MBSL Employee</h5>
    </div>
    <a href="employee_dashboard.html" class="active"><i class="bi bi-grid me-2"></i>Dashboard</a>
    <a href="apply_leave.html" id="applyLeaveLink"><i class="bi bi-calendar-plus me-2"></i>Apply Leave</a>
    <a href="#my-leaves"><i class="bi bi-calendar-check me-2"></i>My Leave Requests</a>
    <a href="#profile"><i class="bi bi-person me-2"></i>My Profile</a>
    <a href="#change-pwd"><i class="bi bi-lock me-2"></i>Change Password</a>
    <a href="login.html"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
</div>

<!-- MAIN CONTAINER (with sidebar margin) -->
<div class="main">
    <!-- Header part in dashboard -->
    <div class="top-header">
        <h1 class="header-title">Welcome, <span id="empName">Employee</span>!</h1>
        <div class="header-actions">
            <button class="header-icon-btn" title="Settings"><i class="bi bi-gear"></i></button>
            <button class="header-icon-btn" title="Notifications"><i class="bi bi-bell"></i></button>
            <div class="header-profile">
                <div class="header-avatar" id="empAvatar" title="Employee Profile">E</div>
            </div>
        </div>
    </div>

    <!-- ADVANCED LEAVE BALANCE CARDS -->
    <div class="metrics-row" id="leaveBalancesContainer">
        <!-- Populated by JS -->
    </div>

</div>

<!-- PROFILE MODAL -->
<div id="profileModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; backdrop-filter: blur(4px); animation: fadeIn 0.3s ease;">
  <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border-radius: 16px; padding: 32px; width: 90%; max-width: 450px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideUp 0.3s ease;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 style="margin: 0; color: var(--text-main);">My Profile</h3>
      <button id="closeProfileModal" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #999;">×</button>
    </div>
    
    <div id="profileContent" style="color: var(--text-main);">
      <div style="text-align: center; margin-bottom: 20px;">
        <div id="profileAvatar" style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #118ab2, #06d6a0); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; margin: 0 auto; box-shadow: 0 8px 16px rgba(17,138,178,0.3);"></div>
      </div>
      
      <div style="background: #f6fafc; padding: 16px; border-radius: 12px; margin-bottom: 16px;">
        <div style="margin-bottom: 12px;">
          <div style="font-size: 12px; color: #56717a; font-weight: 600; margin-bottom: 4px;">FULL NAME</div>
          <div id="profileFullName" style="font-size: 16px; font-weight: 700;">—</div>
        </div>
        <div style="margin-bottom: 12px;">
          <div style="font-size: 12px; color: #56717a; font-weight: 600; margin-bottom: 4px;">EMAIL</div>
          <div id="profileEmail" style="font-size: 14px;">—</div>
        </div>
        <div style="margin-bottom: 12px;">
          <div style="font-size: 12px; color: #56717a; font-weight: 600; margin-bottom: 4px;">EMPLOYEE ID</div>
          <div id="profileEmpId" style="font-size: 14px;">—</div>
        </div>
        <div style="margin-bottom: 12px;">
          <div style="font-size: 12px; color: #56717a; font-weight: 600; margin-bottom: 4px;">DEPARTMENT</div>
          <div id="profileDept" style="font-size: 14px;">—</div>
        </div>
        <div>
          <div style="font-size: 12px; color: #56717a; font-weight: 600; margin-bottom: 4px;">POSITION</div>
          <div id="profilePos" style="font-size: 14px;">—</div>
        </div>
      </div>
      
      <div style="display: flex; gap: 10px;">
        <button id="editProfileBtn" class="btn btn-sm btn-primary" style="flex: 1;">Edit Profile</button>
        <button id="changePasswordBtn" class="btn btn-sm btn-warning" style="flex: 1;">Change Password</button>
        <button id="closeProfileModal2" class="btn btn-sm btn-secondary" style="flex: 1;">Close</button>
      </div>
    </div>

    <!-- EDIT FORM (hidden by default) -->
    <div id="editFormContent" style="display: none; color: var(--text-main);">
      <form id="editProfileForm">
        <div style="margin-bottom: 12px;">
          <label style="font-size: 12px; color: #56717a; font-weight: 600; display: block; margin-bottom: 4px;">Full Name</label>
          <input id="editFullName" type="text" class="form-control" placeholder="Full name" />
        </div>
        <div style="margin-bottom: 12px;">
          <label style="font-size: 12px; color: #56717a; font-weight: 600; display: block; margin-bottom: 4px;">Email</label>
          <input id="editEmail" type="email" class="form-control" placeholder="Email" />
        </div>
        <div style="margin-bottom: 12px;">
          <label style="font-size: 12px; color: #56717a; font-weight: 600; display: block; margin-bottom: 4px;">Department</label>
          <input id="editDept" type="text" class="form-control" placeholder="Department" />
        </div>
        <div style="margin-bottom: 16px;">
          <label style="font-size: 12px; color: #56717a; font-weight: 600; display: block; margin-bottom: 4px;">Position</label>
          <input id="editPos" type="text" class="form-control" placeholder="Position" />
        </div>
        <div id="editMessage" style="margin-bottom: 12px; font-size: 13px; color: #999;"></div>
        <div style="display: flex; gap: 10px;">
          <button type="submit" class="btn btn-sm btn-success" style="flex: 1;">Save Changes</button>
          <button type="button" id="cancelEditBtn" class="btn btn-sm btn-secondary" style="flex: 1;">Cancel</button>
        </div>
      </form>
    </div>

    <!-- CHANGE PASSWORD FORM -->
    <div id="changePasswordContent" style="display: none; color: var(--text-main);">
      <h4 style="margin: 0 0 16px; font-size: 16px; color: #118ab2;">Change Password Request</h4>
      <div id="pwdStatus" style="background: #f6fafc; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; color: #56717a;"></div>
      
      <div id="requestPwdForm">
        <h5 style="margin: 0 0 12px; font-size: 13px;">Request from Admin</h5>
        <form id="pwdRequestForm">
          <div style="margin-bottom: 12px;">
            <label style="font-size: 12px; color: #56717a; font-weight: 600; display: block; margin-bottom: 4px;">Reason (optional)</label>
            <textarea id="pwdReason" class="form-control" placeholder="Why do you need to change your password?" rows="2"></textarea>
          </div>
          <div id="requestMessage" style="margin-bottom: 12px; font-size: 13px; color: #999;"></div>
          <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-sm btn-info" style="flex: 1;">Request from Admin</button>
            <button type="button" id="cancelPwdBtn" class="btn btn-sm btn-secondary" style="flex: 1;">Back</button>
          </div>
        </form>
      </div>

      <div id="setNewPwdForm" style="display: none;">
        <h5 style="margin: 0 0 12px; font-size: 13px; color: #06d6a0;">✓ Admin Approved - Set New Password</h5>
        <form id="newPwdForm">
          <div style="margin-bottom: 12px;">
            <label style="font-size: 12px; color: #56717a; font-weight: 600; display: block; margin-bottom: 4px;">New Password</label>
            <input id="newPassword" type="password" class="form-control" placeholder="Enter new password" />
          </div>
          <div style="margin-bottom: 12px;">
            <label style="font-size: 12px; color: #56717a; font-weight: 600; display: block; margin-bottom: 4px;">Confirm Password</label>
            <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm new password" />
          </div>
          <div id="setPwdMessage" style="margin-bottom: 12px; font-size: 13px; color: #999;"></div>
          <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-sm btn-success" style="flex: 1;">Change Password</button>
            <button type="button" id="cancelSetPwdBtn" class="btn btn-sm btn-secondary" style="flex: 1;">Back</button>
          </div>
        </form>
      </div>
    </div>

<style>
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideUp {
  from { transform: translate(-50%, -40%); opacity: 0; }
  to { transform: translate(-50%, -50%); opacity: 1; }
}
</style>
